timezone: Asia/Shanghai
browser:
  profile_dir_env: DAILY_INTEL_PROFILE_DIR
  channel_env: DAILY_INTEL_BROWSER_CHANNEL
  default_channel: ''
  global_concurrency: 3
  per_domain_concurrency: 1
  navigation_timeout_ms: 45000
  default_wait_ms: 3500
budget:
  max_runtime_seconds: 600
  max_agent_tokens: 10000000
  context_items_per_source: 25
  report_items_per_source: 15
  max_fulltext_per_run: 12
sources:
- id: weibo_hot
  name: Weibo Hot Search
  report_target: 15
  report_max: 15
  enabled: true
  mode: weibo_api
  url: https://m.weibo.cn/api/container/getIndex?containerid=106003type%3D25%26t%3D3%26disable_hot%3D1%26filter_type%3Drealtimehot
  max_items: 50
  role: discovery
  module: information
  category: domestic
  language: zh
  region: cn
- id: yicai_economy
  name: 第一财经
  enabled: true
  mode: browser_index
  url: https://www.yicai.com/news/
  include_domains:
  - yicai.com
  max_items: 80
  report_target: 8
  report_max: 15
  role: evidence
  article_patterns:
  - ^https://www\.yicai\.com/news/\d+\.html$
  exclude_patterns:
  - /video/
  - /brief/
  - /image/
  content_selectors:
  - article
  - main article
  - main
  module: information
  category: market
  language: zh
  region: cn
